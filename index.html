<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-box">
        <h2>Weather Search</h2>
        
        <form id="weatherform">
            <input type="text" id="city-input" placeholder="Type city name..." required>
            <button type="submit">Check Weather</button>
        </form>

        <div class="info">
            </div>

        <div class="history-section">
            <p><strong>Recently Viewed:</strong></p>
            <ul id="city-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
